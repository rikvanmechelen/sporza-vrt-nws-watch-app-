<svg xmlns="http://www.w3.org/2000/svg" width="480" height="480" viewBox="0 0 480 480" font-family="Noto Sans, sans-serif">
  <defs>
    <clipPath id="round"><circle cx="240" cy="240" r="240"/></clipPath>
    <pattern id="pstripes" width="46" height="46" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <rect width="46" height="46" fill="#2a1c63"/>
      <rect width="23" height="46" fill="#342178"/>
    </pattern>
    <linearGradient id="scrim2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.15" stop-color="#000000" stop-opacity="0"/>
      <stop offset="0.55" stop-color="#000000" stop-opacity="0.45"/>
      <stop offset="0.80" stop-color="#000000" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect width="480" height="480" fill="#000000"/>
  <g clip-path="url(#round)">
    <rect x="0" y="0" width="480" height="270" fill="url(#pstripes)"/>
    <rect x="0" y="0" width="480" height="270" fill="url(#scrim2)"/>
    <rect x="0" y="270" width="480" height="210" fill="#000000"/>

    <!-- kicker + title (left, flowing down like the reader) -->
    <text x="46" y="192" font-size="15" font-weight="700" fill="#C7C0FF" letter-spacing="0.6">LOREM IPSUM</text>
    <text x="46" y="230" font-size="31" font-weight="700" fill="#FFFFFF">Lorem ipsum dolor</text>
    <text x="46" y="266" font-size="31" font-weight="700" fill="#FFFFFF">sit amet consectetur</text>
    <text x="46" y="302" font-size="31" font-weight="700" fill="#FFFFFF">adipiscing</text>

    <!-- meta row -->
    <rect x="46" y="330" width="19" height="19" rx="6" fill="#302070"/>
    <text x="55.5" y="344.5" text-anchor="middle" font-size="12" font-weight="800" fill="#C7C0FF">L</text>
    <text x="74" y="345" font-size="15" fill="#A6AAB2">Lorem NWS &#183; 3 min geleden</text>

    <!-- body -->
    <text x="66" y="384" font-size="17" fill="#FFFFFF" opacity="0.88">Lorem ipsum dolor sit amet,</text>
    <text x="66" y="408" font-size="17" fill="#FFFFFF" opacity="0.88">consectetur adipiscing.</text>
  </g>
</svg>
